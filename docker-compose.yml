version: "3.9"
services:
  postgres:
    image: postgres:16.2-alpine
    environment:
      POSTGRES_DB: seat_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: ap-southeast-1
    volumes:
      - localstack_data:/var/lib/localstack

  sentry:
    image: sentry:23.11.0
    ports:
      - "9000:9000"
    environment:
      SENTRY_SECRET_KEY: sentry-secret-key
      SENTRY_POSTGRES_HOST: postgres
      SENTRY_POSTGRES_PORT: 5432
      SENTRY_POSTGRES_DB: sentry
      SENTRY_POSTGRES_USER: postgres
      SENTRY_POSTGRES_PASSWORD: postgres
      SENTRY_REDIS_HOST: redis
      SENTRY_REDIS_PORT: 6379
      SENTRY_REDIS_DB: 0
    volumes:
      - sentry_data:/var/lib/sentry
    depends_on:
      - postgres
      - redis

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  mongo_data:
  localstack_data:
  sentry_data:
  redis_data:

